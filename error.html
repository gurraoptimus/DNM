<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Error</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f8d7da; color: #721c24; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .error-box { background: #fff; border: 1px solid #f5c6cb; padding: 2em 3em; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h1 { margin: 0 0 0.5em 0; }
    p { margin: 0; }
    button { margin-top: 1.5em; padding: 0.5em 2em; background: #f5c6cb; border: none; border-radius: 4px; color: #721c24; font-weight: bold; cursor: pointer; }
    button:hover { background: #f1b0b7; }
  </style>
</head>
<body>
  <div class="error-box">
    <h1>Update Error</h1>
    <p id="error-message">An error occurred while checking for updates.</p>
    <button onclick="window.close()">Close</button>
  </div>
</body>
</html>
