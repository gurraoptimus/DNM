<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        body {
            background: rgba(10,24,51,0.95);
            color: #21e6c1;
            font-family: 'Segoe UI', Consolas, monospace;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .splash-box {
            text-align: center;
        }
        .splash-title {
            font-size: 2em;
            margin-bottom: 18px;
            color: #21e6c1;
        }
        .splash-loader {
            border: 6px solid #162447;
            border-top: 6px solid #21e6c1;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            animation: spin 1s linear infinite;
            margin: 0 auto 18px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .splash-desc {
            color: #e0e0e0;
            font-size: 1.1em;
        }
    </style>
</head>
<body>
    <div class="splash-box">
        <div class="splash-title">Device Network Monitor</div>
        <div class="splash-loader"></div>
        <div class="splash-desc">Loading, please wait...</div>
    </div>
</body>
</html>
